<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Web</title>
</head>
<body>
    <header>
        <section class="Seccion1">
            <h1>
                Monique Café
            </h1>
            <img src="Imagenes/Cofee.png" alt="Logo" id="Logo">
        </section>

        <nav class="Navegacion">
            <a href="#">Productos</a>
            <a href="#" id="Mision">Misión</a>
            <a href="#" id="Vision">Visión</a>
            <a href="#">Proveedores</a>
            <a href="#"><img src="Imagenes/Login.png" height="30px" alt=""><p>Ingresar</p></a>
        </nav>
    </header>

    <section class="Producto">
        <article>
            <section class="Promociones">
                <h2>Ingresa al link para estar al tanto de nuestras promociones</h2>
                <img src="Imagenes/Link.png" alt="">
                <input type="button" value="Ir a promociones" src="#">
            </section>

            <section class="Registro">
                <div class="Encuesta">
                    <h4>¿Ya eres cliente de nuestra cafeteria? Si aún no eres cliente registrate en el siguiente enlace</h4>
                    <img src="Imagenes/Link 2.png" alt="">
                    <input type="button" value="Registrate" src="#">
                </div>
            </section>
        </article>
    </section>

    <footer>
        <section class="Pie_Pagina">
            <div class="Redes">
                <p id="Seguir">Siguenos en: </p>
                
                <div class="Face">
                    <a href="#"><img src="Imagenes/Redes sociales/Facebook.png" id="Facebook" alt=""></a>
                    <label for="Facebook" id="Label_Face">Monique Café</label>
                </div>

                <div class="Insta">
                    <a href="#"><img src="Imagenes/Redes sociales/Instagram.png"  alt="" id="Instagram"></a>
                    <label for="Instagram" id="Label_Instagram">Monique_Café</label>
                </div>

                <p id="Informacion_Cafeteria">Acerca de:</p>

                <div class="Imgs">
                    <a href="#"><img src="Imagenes/Información/Nosotros.png" id="Info_Empresa" alt=""></a>
                    <a href="#" id="Ubicacion"><img src="Imagenes/Información/Ubicacion.png" alt=""></a>
                    <a href="#" id="Whatsapp"><img src="Imagenes/Información/Whatsapp.png" alt=""></a>
                </div>
            </div>
        </section>
    </footer>
</body>
</html>
